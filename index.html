<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>The Bowler</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <header class="header">
      <h1>The Bowler</h1>
      <p class="subtitle">Pull back to throw. Keep rolling and clear the path!</p>
      <button id="music-toggle" class="music-toggle" type="button" aria-label="Toggle music">Music: On</button>
    </header>

    <section class="game">
      <div class="action-window">
        <canvas id="game" width="900" height="500" aria-label="The Bowler game canvas"></canvas>
        <div class="hud">
          <div class="hud-item">Score: <span id="score">0</span></div>
          <div class="hud-item">Best: <span id="best">0</span></div>
        </div>
        <div class="overlay" id="overlay">
          <div class="overlay-content">
            <div class="splash-art" aria-hidden="true"></div>
            <h2>Tap to Start</h2>
            <p>Use the control pad below: pull back and release to throw.</p>
          </div>
        </div>
      </div>
      <div class="control-pad" id="control-pad" aria-label="Throw control pad">
        <p class="control-pad-label">Control Pad: Pull back and release</p>
      </div>
    </section>

    <footer class="footer">
      <p>Made with HTML5 Canvas • Mobile-first</p>
    </footer>
  </main>

  <script type="module" src="src/game.js"></script>
</body>
</html>
